name: CI

on:
  push:
    branches: [main, 'security/**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (test + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: netwatch_erp
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s --health-timeout=5s --health-retries=15
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=5s --health-retries=15
    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: netwatch_erp
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
      JWT_SECRET: ci_only_secret_min_32_chars_not_for_production_use
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: DB migrate (schema + indexes)
        run: npm run migrate
      - name: Run tests
        run: npm test
      - name: Security audit (fail on high+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (tsc -b + vite build)
        run: npm run build
      - name: Lint
        run: npm run lint
        continue-on-error: true
